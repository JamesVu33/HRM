[pytest]
testpaths = tests
pythonpath = .
addopts = -v
# Log steps, inputs, results to console and file (for report)
log_cli = true
log_cli_level = INFO
log_cli_format = [%(asctime)s] [%(levelname)s] %(message)s
log_file = test_report.log
log_file_level = INFO
log_file_format = [%(asctime)s] [%(levelname)s] %(name)s | %(message)s
